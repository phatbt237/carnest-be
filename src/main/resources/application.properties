# DATABASE - MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/carnest_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=Asia/Ho_Chi_Minh&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=12345678
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT Configuration
app.jwt.secret=carnest_super_secret_key_change_this_in_production_must_be_at_least_256_bits_long_ok
app.jwt.expiration-ms=86400000
app.jwt.refresh-expiration-ms=604800000

# Server
server.port=8080
spring.application.name=carnest

# Swagger
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.use-fqn=true

logging.level.com.example.carnest.Service.OrderScheduler=DEBUG